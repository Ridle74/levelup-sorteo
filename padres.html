<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f2f2f2; color: #111; font-family: 'Barlow', sans-serif; -webkit-font-smoothing: antialiased; }
#app { min-height: 100dvh; }
body.nav-visible { padding-bottom: calc(64px + env(safe-area-inset-bottom)); }

#initial-loading { position: fixed; inset: 0; z-index: 9999; background: #f2f2f2; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
#initial-loading.hidden { display: none; }
.vw { animation: vIn 0.18s ease-out; }
@keyframes vIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

#bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: rgba(255,255,255,0.97); backdrop-filter: blur(16px); border-top: 1px solid rgba(0,0,0,0.08); padding-bottom: env(safe-area-inset-bottom); }
#bottom-nav.visible { display: block; }

#hist-bar { display:none; position: fixed; top: 0; left: 0; right: 0; z-index: 200; gap:8px; padding: calc(8px + env(safe-area-inset-top)) 12px 8px; background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.08); }
#hist-bar.visible { display:flex; }
.hist-btn { border:none; background: rgba(0,0,0,0.06); color: #111; width:38px; height:34px; border-radius:10px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
.hist-btn:not(:disabled):active { background: rgba(0,0,0,0.14); }
.hist-btn:disabled { opacity:0.3; cursor:default; }
#hist-home { background: rgba(0,0,0,0.08); color:#111; }
body.hist-visible #app { padding-top: calc(50px + env(safe-area-inset-top)); }

.nav-row { display: flex; max-width: 600px; margin: 0 auto; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 10px 2px 8px; border: none; background: none; cursor: pointer; color: rgba(0,0,0,0.3); font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
.nav-btn .ni { font-size: 22px; line-height: 1; display: block; }
.nav-btn.active { color: #111; }
.nav-btn.active .ni { filter: none; }

.dash-hero { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 20px; padding: 20px; margin-bottom: 10px; position: relative; overflow: hidden; }
.dash-hero::before { display:none; }
.sec-lbl { font-size:9px; font-weight:900; color:rgba(0,0,0,0.35); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:8px; }

.fsm { width:100%; background:#fff; border:1px solid rgba(0,0,0,0.14); border-radius:10px; padding:11px 12px; color:#111; font-family:'Barlow',sans-serif; font-size:14px; box-sizing:border-box; margin-bottom:10px; outline:none; }
.fsm:focus { border-color:rgba(0,0,0,0.4); }
.btn-grn { width:100%; border:none; border-radius:12px; padding:13px; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:14px; letter-spacing:0.12em; text-transform:uppercase; background:#111; color:#fff; transition: opacity 0.15s; }
.btn-grn:active { opacity: 0.8; }
.btn-ghost { width:100%; border:1px solid rgba(0,0,0,0.15); border-radius:12px; padding:11px; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; background:#fff; color:rgba(0,0,0,0.55); margin-top:8px; }

/* Child chips */
.child-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.child-chip { display:flex; align-items:center; gap:6px; border:1px solid rgba(0,0,0,0.15); border-radius:14px; padding:8px 14px; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:900; color:rgba(0,0,0,0.45); background:#fff; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.child-chip.csel { border-color:#111; color:#111; background:rgba(0,0,0,0.06); }

.pcal-outer { display:flex; flex-direction:column; height:calc(100dvh - 64px - env(safe-area-inset-bottom)); overflow:hidden; background:transparent; }
.pcal-toolbar { flex-shrink:0; display:flex; align-items:center; gap:8px; padding:10px 14px 6px; }
.pcal-toggle { display:flex; border:1px solid rgba(0,0,0,0.14); border-radius:10px; overflow:hidden; background:#fff; }
.pcal-toggle button { border:none; background:transparent; color:rgba(0,0,0,0.4); font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; padding:7px 14px; cursor:pointer; transition:background 0.15s,color 0.15s; }
.pcal-toggle button.on { background:#111; color:#fff; }
.pcal-today-btn { border:1px solid rgba(0,0,0,0.2); background:#fff; color:rgba(0,0,0,0.6); font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; padding:7px 12px; border-radius:8px; cursor:pointer; }
.pcal-nav { margin-left:auto; display:flex; gap:6px; }
.pcal-nav button { border:1px solid rgba(0,0,0,0.14); background:#fff; color:#111; border-radius:8px; width:32px; height:32px; font-size:15px; cursor:pointer; }
.pcal-range-bar { flex-shrink:0; padding:0 14px 8px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; color:rgba(0,0,0,0.4); letter-spacing:0.08em; text-transform:uppercase; }
.pcal-child-bar { flex-shrink:0; padding:0 14px 8px; display:flex; flex-wrap:wrap; gap:6px; }
.pcal-head-row { flex-shrink:0; display:flex; border-bottom:1px solid rgba(0,0,0,0.08); background:#f2f2f2; }
.pcal-gutter { flex-shrink:0; width:42px; }
.pcal-days-hdr { display:flex; overflow:hidden; flex:1; }
.pcal-dh { flex-shrink:0; text-align:center; padding:5px 2px 7px; border-left:1px solid rgba(0,0,0,0.06); }
.pcal-dh-name { font-size:9px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase; color:rgba(0,0,0,0.35); }
.pcal-dh-num  { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; line-height:1.1; color:rgba(0,0,0,0.6); }
.pcal-dh-hoy  { font-size:7px; font-weight:900; letter-spacing:0.1em; text-transform:uppercase; background:#111; color:#fff; padding:1px 6px; border-radius:5px; display:inline-block; margin-top:1px; }
.pcal-dh.is-today .pcal-dh-name { color:#111; }
.pcal-dh.is-today .pcal-dh-num  { color:#111; font-weight:900; }
.pcal-dh.is-past .pcal-dh-name,.pcal-dh.is-past .pcal-dh-num { opacity:0.25; }
.pcal-body-scroll { flex:1; min-height:0; overflow:auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin; scrollbar-color:rgba(0,0,0,0.1) transparent; background:#fff; }
.pcal-body-inner { display:flex; }
.pcal-tl { flex-shrink:0; width:42px; background:#f8f8f8; border-right:1px solid rgba(0,0,0,0.06); }
.pcal-tl-slot { display:flex; align-items:flex-start; justify-content:flex-end; padding-right:7px; padding-top:3px; font-size:9px; font-weight:700; color:rgba(0,0,0,0.25); letter-spacing:0.03em; }
.pcal-days-body { display:flex; position:relative; flex:1; }
.pcal-day-col { flex-shrink:0; position:relative; border-left:1px solid rgba(0,0,0,0.05); }
.pcal-hour-line { border-bottom:1px solid rgba(0,0,0,0.05); }
.pcal-day-col.is-today { background:rgba(0,0,0,0.02); border-left:1px solid rgba(0,0,0,0.2); }
.pcal-day-col.is-past  { opacity:0.35; }
.pcal-ev { position:absolute; border-radius:8px; padding:4px 6px 3px; overflow:hidden; }
.pcal-ev-parent { font-size:7px; font-weight:900; letter-spacing:0.1em; text-transform:uppercase; color:rgba(0,0,0,0.4); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pcal-ev-name  { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:900; color:#111; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pcal-ev-time  { font-size:8px; font-weight:700; color:rgba(0,0,0,0.55); margin-top:1px; white-space:nowrap; }
.pcal-ev-badge { font-size:7px; font-weight:900; letter-spacing:0.06em; text-transform:uppercase; color:rgba(0,0,0,0.35); margin-top:1px; }
.pcal-now { position:absolute; z-index:10; pointer-events:none; display:flex; align-items:center; }
.pcal-now-dot  { flex-shrink:0; width:8px; height:8px; border-radius:50%; background:#111; margin-left:-4px; }
.pcal-now-line { flex:1; height:1px; background:rgba(0,0,0,0.35); }
.cal-slot { border-radius:10px; padding:9px 11px; margin-bottom:6px; border-left:4px solid; }
.cal-slot .cs-time { font-family:'Barlow',sans-serif; font-weight:700; font-size:15px; }
.cs-meta { font-family:'Barlow',sans-serif; font-size:12px; font-weight:600; color:rgba(0,0,0,0.5); margin-top:3px; line-height:1.5; }

/* Request card */
.req-card { background:#fff; border:1px solid rgba(0,0,0,0.1); border-radius:16px; padding:16px; margin-top:14px; }
.req-row { display:flex; gap:8px; margin-bottom:8px; }
.req-row select, .req-row input { flex:1; }
.req-list-item { background:#fff; border:1px solid rgba(0,0,0,0.08); border-radius:12px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:10px; }

.req-status.appr { background:#111; color:#fff; }
.req-status.rej  { background:rgba(0,0,0,0.05); color:rgba(0,0,0,0.35); }

.login-wrap { max-width:380px; margin:0 auto; padding-top:12vh; padding-left:20px; padding-right:20px; }
.login-logo { text-align:center; margin-bottom:28px; }
.login-logo .lt { font-family:'Barlow Condensed',sans-serif; font-size:13px; letter-spacing:0.3em; text-transform:uppercase; color:rgba(0,0,0,0.35); }
.login-logo .ll { font-family:'Barlow Condensed',sans-serif; font-size:30px; font-weight:900; color:#111; margin-top:2px; }
.field-label { font-size:10px; font-weight:900; color:rgba(0,0,0,0.4); letter-spacing:0.18em; text-transform:uppercase; margin-bottom:6px; display:block; }
.tab-row { display:flex; gap:8px; margin-bottom:18px; }
.tab-row button { flex:1; border:1px solid rgba(0,0,0,0.12); background:#fff; color:rgba(0,0,0,0.4); border-radius:12px; padding:10px; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; }
.tab-row button.on { background:#111; border-color:#111; color:#fff; }

.dash-link { display:flex; align-items:center; gap:12px; background:#fff; border:1px solid rgba(0,0,0,0.08); border-radius:14px; padding:14px 16px; margin-bottom:8px; cursor:pointer; color:#111; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:900; text-transform:uppercase; letter-spacing:0.05em; transition:background 0.12s; -webkit-tap-highlight-color:transparent; }
.dash-link:active { background:rgba(0,0,0,0.04); }
.dl-ico { font-size:24px; flex-shrink:0; }
.dl-arr { margin-left:auto; color:rgba(0,0,0,0.2); font-size:20px; }

</head>

let DATA = JSON.parse(JSON.stringify(SEED));
DATA.adminPin = ADMIN_PIN_DEFAULT;
// Versión de los datos semilla — al incrementarla se sobrescriben parents/students/sessions
// en Firestore con los nuevos valores de SEED (preservando requests/accountRequests existentes).
const SEED_VERSION = 6;
let appReady = false;
let calMode = 'week';          // 'week' | '4dias'
let calAnchor = startOfWeek(new Date());
let selectedChild = null;      // studentId actualmente mostrado en calendario

let editingParentId = null;    // id de padre cuyo PIN se está editando en el panel admin

function startOfWeek(d) {
  const x = new Date(d); const day = x.getDay();
  // Start on Monday (day 1); Sunday (0) goes back 6 days
  x.setDate(x.getDate() - (day === 0 ? 6 : day - 1)); x.setHours(0,0,0,0); return x;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function stripTitle(name) {
  return (name||'').replace(/^(Sra\.?|Sr\.?|Dra\.?|Dr\.?)\s*/i, '').trim();
}
function fmtDM(d) { return d.toLocaleDateString('es-PE',{ day:'numeric', month:'short' }); }
function fmtCycleDate(iso) {
  const d = new Date(iso+'T00:00:00');
  const s = d.toLocaleDateString('es-PE',{ weekday:'long', day:'numeric', month:'long', year:'numeric' });
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// ════════════════════════════════════════════════════════
// FIREBASE LOAD / SAVE
// ════════════════════════════════════════════════════════
function loadData() {
  let pending = 2;
  const done = () => { if (--pending === 0) { appReady = true; boot(); } };

  REF.get().then(snap => {
    if (snap.exists) {
      const d = snap.data();
      if ((d.seedVersion || 0) < SEED_VERSION) {
        // Datos nuevos del ciclo (horarios, alumnos, padres) — sobrescribir,
        // conservando solicitudes y cuentas pendientes ya existentes.
        DATA.parents         = SEED.parents;
        DATA.students        = SEED.students;
        DATA.sessions        = SEED.sessions;
        DATA.cycleName       = SEED.cycleName;
        DATA.cycleEnd        = SEED.cycleEnd;
        DATA.requests        = d.requests        || [];
        DATA.accountRequests = d.accountRequests || [];
        // Las cuentas/alumnos viejos que ya no están en SEED quedan como mapas
        // "huérfanos" en Firestore (merge no borra claves) — hay que eliminarlos
        // explícitamente con FieldValue.delete() antes de escribir los nuevos.
        const delFields = {};
        Object.keys(d.parents  || {}).forEach(pid => { if (!(pid in SEED.parents))  delFields['parents.'+pid]  = firebase.firestore.FieldValue.delete(); });
        Object.keys(d.students || {}).forEach(sid => { if (!(sid in SEED.students)) delFields['students.'+sid] = firebase.firestore.FieldValue.delete(); });
        const cleanup = Object.keys(delFields).length ? REF.update(delFields).catch(()=>{}) : Promise.resolve();
        cleanup.then(() => REF.set({
          parents: SEED.parents, students: SEED.students, sessions: SEED.sessions,
          cycleName: SEED.cycleName, cycleEnd: SEED.cycleEnd, seedVersion: SEED_VERSION
        }, { merge:true })).catch(()=>{});
      } else {
        DATA.parents         = d.parents         || SEED.parents;
        DATA.students        = d.students        || SEED.students;
        DATA.sessions        = d.sessions        || SEED.sessions;
        DATA.cycleName       = d.cycleName       || SEED.cycleName;
        DATA.cycleEnd        = d.cycleEnd        || SEED.cycleEnd;
        DATA.requests        = d.requests        || [];
        DATA.accountRequests = d.accountRequests || [];
      }
    } else {
      // Primera vez: sembrar Firestore con datos base.
      REF.set(Object.assign({}, SEED, { seedVersion: SEED_VERSION })).catch(()=>{});
    }
    done();
  }).catch(e => {
    console.error(e);
    done(); // seguimos con SEED local si Firestore falla
  });

  // Clave admin compartida con /student — un solo documento, una sola clave.
  AUTH_REF.get().then(snap => {
    if (snap.exists && snap.data().adminPin) {
      DATA.adminPin = snap.data().adminPin;
    } else {
      AUTH_REF.set({ adminPin: ADMIN_PIN_DEFAULT }, { merge:true }).catch(()=>{});
      DATA.adminPin = ADMIN_PIN_DEFAULT;
    }
    done();
  }).catch(e => {
    console.error(e);
    DATA.adminPin = ADMIN_PIN_DEFAULT;
    done();
  });
}
function saveRequests() {
  REF.set({ requests: DATA.requests }, { merge:true })
    .catch(e => { console.error(e); showToast('Error al guardar la solicitud.'); });
}
function saveAccountRequests() {
  REF.set({ accountRequests: DATA.accountRequests }, { merge:true })
    .catch(e => { console.error(e); showToast('Error al guardar la solicitud.'); });
}
function saveParents() {
  REF.set({ parents: DATA.parents }, { merge:true })
    .catch(e => { console.error(e); showToast('Error al guardar los cambios.'); });
}
function saveAdminPin(newPin) {
  return AUTH_REF.set({ adminPin: newPin }, { merge:true }).then(() => { DATA.adminPin = newPin; });
}

let _tt;
function showToast(msg, type='error') {
  const el = document.getElementById('toast'); if (!el) return;
  document.getElementById('toast-icon').textContent = type==='success'?'✅':'⚠️';
  document.getElementById('toast-msg').textContent  = msg;
  el.classList.add('show'); clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

// ROUTER
// ════════════════════════════════════════════════════════
function go(view) {
  if (view !== currentView) {
    // Si veníamos de navegar atrás, descartamos el "futuro" antes de añadir la nueva vista.
    navHistory = navHistory.slice(0, navIndex + 1);
    navHistory.push(view);
    navIndex = navHistory.length - 1;
  }
  currentView = view;
  render();
}
function navBack() {
  if (navIndex <= 0) return;
  navIndex--;
  currentView = navHistory[navIndex];
  render();
}
function navForward() {
  if (navIndex >= navHistory.length - 1) return;
  navIndex++;
  currentView = navHistory[navIndex];
  render();
}
function navHome() {
  go(isLoggedAdmin() ? 'a-inicio' : 'inicio');
}

function render() {
  if (!appReady) return;
  const parentId  = getLoggedParent();
  const adminMode = isLoggedAdmin();
  const app = document.getElementById('app');
  const nav = document.getElementById('bottom-nav');

  const loggedIn = adminMode || parentId !== null;
  if (!loggedIn && currentView !== 'login') currentView = 'login';
  if (loggedIn && currentView === 'login') currentView = adminMode ? 'a-inicio' : 'inicio';

  // Historial de navegación (botones atrás / inicio / adelante)
  if (!loggedIn) {
    navHistory = []; navIndex = -1;
  } else if (navIndex < 0 || navHistory[navIndex] !== currentView) {
    if (navIndex >= 0 && navHistory[navIndex] !== currentView) {
      navHistory = navHistory.slice(0, navIndex + 1);
    }
    navHistory.push(currentView);
    navIndex = navHistory.length - 1;
  }
  const histBar = document.getElementById('hist-bar');
  if (histBar) {
    histBar.classList.toggle('visible', loggedIn);
    document.body.classList.toggle('hist-visible', loggedIn);
    const backBtn = document.getElementById('hist-back');
    const fwdBtn  = document.getElementById('hist-fwd');
    if (backBtn) backBtn.disabled = navIndex <= 0;
    if (fwdBtn)  fwdBtn.disabled  = navIndex >= navHistory.length - 1;
  }

  const views = adminMode
    ? { 'a-inicio': vAdminInicio, 'a-cuentas': vAdminCuentas, 'a-solicitudes': vAdminSolicitudes, 'a-calendario': vAdminCalendario }
    : { login: vLogin, inicio: vInicio, calendario: vCalendario, solicitar: vSolicitar };
  app.innerHTML = `<div class="vw">${(views[currentView]||(adminMode?vAdminInicio:vLogin))()}</div>`;

  document.body.classList.toggle('nav-visible', loggedIn);
  if (loggedIn) {
    nav.classList.add('visible');
    const navItems = adminMode
      ? [
          {r:'a-inicio',      i:'🛠️', l:'Inicio'},
          {r:'a-calendario',  i:'📅', l:'Calendario'},
          {r:'a-solicitudes', i:'📥', l:'Solicitudes'},
          {r:'a-cuentas',     i:'🔑', l:'Cuentas'}
        ]
      : [
          {r:'inicio',     i:'🏠', l:'Inicio'},
          {r:'calendario', i:'📅', l:'Calendario'},
          {r:'solicitar',  i:'➕', l:'Solicitar'}
        ];
    nav.querySelector('#nav-row').innerHTML = navItems.map(n =>
      `<button class="nav-btn${currentView===n.r?' active':''}" onclick="go('${n.r}')"><span class="ni">${n.i}</span><span>${n.l}</span></button>`
    ).join('');
  } else {
    nav.classList.remove('visible');
  }
  bindView();
}

function bindView() {
  if (currentView === 'login') {
    const form = document.getElementById('login-form');
    if (form) {
      // Populate parent selector
      const sel = document.getElementById('sel-parent');
      if (sel && sel.options.length === 1) {
        Object.entries(DATA.parents)
          .sort(([,a],[,b]) => a.name.localeCompare(b.name, 'es'))
          .forEach(([id, p]) => {
            const o = document.createElement('option');
            o.value = id;
            const parts = p.name.split(' ');
            o.textContent = parts.slice(0, 2).join(' ');
            sel.appendChild(o);
          });
        const adm = document.createElement('option');
        adm.value = '__admin__';
        adm.textContent = '— Administrador —';
        sel.appendChild(adm);
      }
      form.addEventListener('submit', e => {
        e.preventDefault();
        const pin      = document.getElementById('login-pin').value.trim();
        const selEl    = document.getElementById('sel-parent');
        const parentId = selEl ? selEl.value : '';
        if (pin === DATA.adminPin) {
          setLoggedAdmin(true);
          currentView = 'a-inicio';
          render();
          return;
        }
        if (parentId === '__admin__' && pin === DATA.adminPin) {
          setLoggedAdmin(true); currentView = 'a-inicio'; render(); return;
        }
        const parent = parentId ? DATA.parents[parentId] : null;
        if (parent && parent.pin === pin) {
          setLoggedParent(parentId);
          selectedChild = null;
          currentView = 'inicio';
          render();
        } else {
          document.getElementById('login-err').style.display = 'block';
        }
      });
    }
    const cform = document.getElementById('crear-form');
    if (cform) cform.addEventListener('submit', e => {
      e.preventDefault();
      const reg = {
        id: Date.now(),
        parentName: document.getElementById('cr-parent').value.trim(),
        phone:      document.getElementById('cr-phone').value.trim(),
        childFirstName:    document.getElementById('cr-cname').value.trim(),
        childFirstSurname: document.getElementById('cr-csurname').value.trim(),
        note: document.getElementById('cr-note').value.trim(),
        status: 'pendiente',
        createdAt: new Date().toISOString()
      };
      if (!reg.parentName || !reg.childFirstName || !reg.childFirstSurname) return;
      DATA.accountRequests.push(reg);
      saveAccountRequests();
      showToast('Solicitud enviada. El profesor revisará tus datos y activará tu cuenta.', 'success');
      e.target.reset();
      loginTab = 'familia';
      render();
    });
  }
}

function setLoginTab(t) { loginTab = t; render(); }

function logout() {
  setLoggedParent(null);
  setLoggedAdmin(false);
  selectedChild = null;
  editingParentId = null;
  currentView = 'login';
  navHistory = []; navIndex = -1;
  render();
}
function selectChild(id) { selectedChild = id === null ? null : Number(id); render(); }
function setCalMode(m) { calMode = m; render(); }
function calStep(dir) {
  const span = calMode === 'week' ? 7 : 4;
  calAnchor = addDays(calAnchor, dir * span);
  render();
}

function buildPadCalGrid(dayList, activeSids, showParent) {
  const ROW_H = 56, MIN_H = 8, MAX_H = 22;
  const HOURS = Array.from({length: MAX_H - MIN_H}, function(_, i){ return MIN_H + i; });
  const totalH = HOURS.length * ROW_H;
  const today = new Date(); today.setHours(0,0,0,0);

  // Build slot map grouped by day+start
  const slotMap = {};
  DATA.sessions.forEach(function(s) {
    if (!activeSids.includes(Number(s.studentId))) return;
    const key = s.day+'|'+s.start;
    if (!slotMap[key]) slotMap[key] = { day:Number(s.day), start:s.start, maxDur:0, students:[] };
    const dur = s.dur || 60;
    if (dur > slotMap[key].maxDur) slotMap[key].maxDur = dur;
    slotMap[key].students.push({ sid: s.studentId, dur: dur, modality: s.modality });
  });

  // Parent map
  const studentParent = {};
  if (showParent) {
    Object.entries(DATA.parents).forEach(function(e) {
      var pid = e[0], p = e[1];
      (p.children||[]).forEach(function(cid){ studentParent[String(cid)] = p.name; });
    });
  }

  const toH = function(t){ var p=t.split(':').map(Number); return p[0]+p[1]/60; };
  const addM = function(t,m){ var p=t.split(':').map(Number),tot=p[0]*60+p[1]+m; return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0'); };

  // Compute column width
  const appEl = document.getElementById('app');
  const appW = appEl ? appEl.offsetWidth : (window.innerWidth||390);
  const numCols = dayList.length;
  const colW = Math.max(Math.floor((appW - 42) / numCols), 60);

  // Day headers
  const hdrs = dayList.map(function(d) {
    const isPast = d < today, isTod = d.getTime()===today.getTime();
    const cls = 'pcal-dh'+(isTod?' is-today':'')+(isPast?' is-past':'');
    return '<div class="'+cls+'" style="width:'+colW+'px">'
      +'<div class="pcal-dh-name">'+DAY_SHORT[d.getDay()]+'</div>'
      +'<div class="pcal-dh-num">'+d.getDate()+'</div>'
      +(isTod?'<div><span class="pcal-dh-hoy">HOY</span></div>':'')
      +'</div>';
  }).join('');

  // Time labels
  const tls = HOURS.map(function(h){
    return '<div class="pcal-tl-slot" style="height:'+ROW_H+'px">'+String(h).padStart(2,'0')+'h</div>';
  }).join('');

  // Day columns
  const cols = dayList.map(function(d) {
    const dow = d.getDay();
    const isPast = d < today, isTod = d.getTime()===today.getTime();
    const cls = 'pcal-day-col'+(isTod?' is-today':'')+(isPast?' is-past':'');
    const lines = HOURS.map(function(){ return '<div class="pcal-hour-line" style="height:'+ROW_H+'px"></div>'; }).join('');
    const slots = Object.values(slotMap).filter(function(sl){ return sl.day===dow; });
    const cards = slots.flatMap(function(slot) {
      const topPx = (toH(slot.start) - MIN_H) * ROW_H;
      const hPx   = Math.max((slot.maxDur / 60) * ROW_H - 3, 28);
      const total = slot.students.length;
      return slot.students.map(function(st, idx) {
        const stData = DATA.students[st.sid] || {};
        const col    = stData.color || 'rgba(0,0,0,0.5)';
        const end    = addM(slot.start, st.dur);
        const lPx    = 2 + Math.round((colW-4)*(idx/total));
        const wPx    = Math.round((colW-4)/total) - (idx<total-1?2:0);
        const short  = hPx < 42;
        const pName  = showParent ? (studentParent[String(st.sid)]||'') : '';
        return '<div class="pcal-ev" style="top:'+topPx+'px;height:'+hPx+'px;left:'+lPx+'px;width:'+wPx+'px;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.12)">'
          +(pName?'<div class="pcal-ev-parent">'+pName+'</div>':'')
          +'<div class="pcal-ev-name">'+(stData.icon||'')+' '+(stData.name||'').split(' ')[0]+'</div>'
          +(short?'':'<div class="pcal-ev-time">'+slot.start+'–'+end+'</div>')
          +(short?'':'<div class="pcal-ev-badge">'+st.modality+'</div>')
          +'</div>';
      });
    }).join('');
    return '<div class="'+cls+'" style="width:'+colW+'px;height:'+totalH+'px">'+lines+cards+'</div>';
  }).join('');

  // Current time indicator
  var nowHtml = '';
  var now = new Date(); var curH = now.getHours()+now.getMinutes()/60;
  if (curH >= MIN_H && curH < MAX_H) {
    var todayIdx = dayList.findIndex(function(d){ return d.getTime()===today.getTime(); });
    if (todayIdx !== -1) {
      var topNow = (curH - MIN_H) * ROW_H;
      nowHtml = '<div class="pcal-now" style="top:'+topNow+'px;left:'+(todayIdx*colW)+'px;width:'+colW+'px">'
        +'<div class="pcal-now-dot"></div><div class="pcal-now-line"></div></div>';
    }
  }

  return '<div class="pcal-head-row">'
    +'<div class="pcal-gutter"></div>'
    +'<div class="pcal-days-hdr" style="width:'+(colW*numCols)+'px">'+hdrs+'</div>'
    +'</div>'
    +'<div class="pcal-body-scroll" id="pcal-scroll">'
    +'<div class="pcal-body-inner" style="padding-bottom:24px">'
    +'<div class="pcal-tl">'+tls+'</div>'
    +'<div class="pcal-days-body" style="width:'+(colW*numCols)+'px">'+cols+nowHtml+'</div>'
    +'</div></div>';
}

function nextStudentId() {
  const ids = Object.keys(DATA.students).map(Number).filter(n=>!isNaN(n));
  return (ids.length ? Math.max(...ids) : 0) + 1;
}
function genPin(len=4) {
  let p; let tries=0;
  do {
    p = String(Math.floor(Math.random()*Math.pow(10,len))).padStart(len,'0');
    tries++;
  } while (tries<30 && (p===DATA.adminPin || Object.values(DATA.parents).some(par=>par.pin===p)));
  return p;
}
function findStudentByName(first, last) {
  const f = first.trim().toLowerCase(), l = last.trim().toLowerCase();
  const entries = Object.entries(DATA.students);
  for (const [id, s] of entries) {
    const parts = s.name.toLowerCase().split(/\s+/);
    if (parts.includes(f) && parts.includes(l)) return parseInt(id);
  }
  return null;
}

function approveAccountRequest(reqId) {
  const reg = DATA.accountRequests.find(r => r.id === reqId);
  if (!reg || reg.status !== 'pendiente') return;

  let studentId = findStudentByName(reg.childFirstName, reg.childFirstSurname);
  let createdNew = false;
  if (!studentId) {
    studentId = nextStudentId();
    DATA.students[studentId] = {
      name: `${reg.childFirstName} ${reg.childFirstSurname}`.trim(),
      color: '#64748b', icon: '👤', modality: 'Virtual'
    };
    createdNew = true;
  }

  const pin = genPin(4);
  const parentId = 'fam_' + reg.id;
  DATA.parents[parentId] = { name: reg.parentName, pin, phone: reg.phone || '', children: [studentId] };

  reg.status = 'aprobada';
  reg.assignedParentId = parentId;
  reg.assignedStudentId = studentId;
  reg.assignedPin = pin;
  reg.resolvedAt = new Date().toISOString();

  REF.set({ parents: DATA.parents, students: DATA.students, accountRequests: DATA.accountRequests }, { merge:true })
    .then(() => showToast(`Cuenta creada. Clave para ${reg.parentName}: ${pin}${createdNew?' (se creó un nuevo alumno en la lista)':''}`, 'success'))
    .catch(e => { console.error(e); showToast('Error al crear la cuenta.'); });
  render();
}
function rejectAccountRequest(reqId) {
  const reg = DATA.accountRequests.find(r => r.id === reqId);
  if (!reg || reg.status !== 'pendiente') return;
  reg.status = 'rechazada';
  reg.resolvedAt = new Date().toISOString();
  saveAccountRequests();
  showToast('Solicitud marcada como rechazada.', 'success');
  render();
}
function setClassRequestStatus(reqId, status) {
  const r = DATA.requests.find(x => x.id === reqId);
  if (!r) return;
  r.status = status;
  saveRequests();
  showToast(status==='aprobada' ? 'Solicitud de clase aprobada.' : 'Solicitud marcada como no disponible.', 'success');
  render();
}
function startEditParentPin(id) { editingParentId = id; render(); }
function cancelEditParentPin() { editingParentId = null; render(); }
function saveParentPin(id) {
  const input = document.getElementById('edit-pin-' + id);
  if (!input) return;
  const val = input.value.trim();
  if (!/^\d{4,6}$/.test(val)) { showToast('La clave debe tener entre 4 y 6 dígitos.'); return; }
  DATA.parents[id].pin = val;
  saveParents();
  editingParentId = null;
  showToast('Clave actualizada.', 'success');
  render();
}

        start: document.getElementById('req-time').value,
        dur: parseInt(document.getElementById('req-dur').value),
        modality: document.getElementById('req-modality').value,
        note: document.getElementById('req-note').value.trim(),
        status: 'pendiente',
        createdAt: new Date().toISOString()
      };
      DATA.requests.push(req);
      saveRequests();
      showToast('Solicitud enviada. Te confirmaremos la disponibilidad pronto.', 'success');
      render();
    });
  }
};

// ════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════
function boot() {
  document.getElementById('initial-loading').classList.add('hidden');
  const parentId = getLoggedParent();
  const parent = parentId !== null ? DATA.parents[parentId] : null;
  if (parent) {
    selectedChild = (parent.children||[])[0] || null;
    currentView = 'inicio';
  } else {
    currentView = 'login';
  }
  render();
}

loadData();
</script>
</body>
</html>
