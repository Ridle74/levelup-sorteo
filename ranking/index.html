<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LEVEL UP — Tabla de Posiciones</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  body {
    background: radial-gradient(ellipse at top, #1a6b3a 0%, #0a3320 40%, #051a10 100%);
    min-height: 100dvh; display: flex; align-items: flex-start; justify-content: center;
    padding: 12px;
  }
  .page-wrap {
    width: 100%; max-width: 420px; display: flex; flex-direction: column;
    border-radius: 24px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    border: 1px solid rgba(132,204,22,0.25); margin-top: 12px;
  }
  .page-header {
    background: linear-gradient(135deg,#065f2e 0%,#0f7a3a 50%,#1a9148 100%);
    padding: 18px 18px 14px; position: relative; overflow: hidden;
  }
  .page-header::before {
    content:''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.02) 20px,rgba(255,255,255,0.02) 40px);
  }
  .page-list {
    background: linear-gradient(180deg,#0a3320 0%,#071f14 100%);
    padding: 10px 12px; display: flex; flex-direction: column; gap: 6px;
    padding-bottom: 20px;
  }
  /* Decoración de fondo */
  .bg-deco { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .bg-deco div { position: absolute; border-radius: 50%; }
</style>
</head>
<body>

<div class="bg-deco">
  <div style="width:300px;height:300px;background:radial-gradient(circle,rgba(132,204,22,0.18),transparent 70%);top:-80px;left:-80px"></div>
  <div style="width:250px;height:250px;background:radial-gradient(circle,rgba(249,115,22,0.15),transparent 70%);bottom:-60px;right:-60px"></div>
  <div style="width:8px;height:8px;background:#84cc16;opacity:0.6;top:8%;left:15%"></div>
  <div style="width:6px;height:6px;background:#f97316;opacity:0.7;top:12%;right:20%"></div>
  <div style="width:5px;height:5px;background:#eab308;opacity:0.5;top:25%;left:8%"></div>
  <div style="width:7px;height:7px;background:#ec4899;opacity:0.6;bottom:20%;right:12%"></div>
</div>

<div class="page-wrap" id="ranking-card" style="position:relative;z-index:1">
  <!-- Header -->
  <div class="page-header">
    <div style="position:relative;display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;letter-spacing:-0.03em;line-height:1">
          <span style="color:#eab308">🏆</span> <span style="color:#84cc16">TABLA DE</span>
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:#fff;letter-spacing:-0.03em;line-height:1">POSICIONES</div>
        <div id="page-subtitle" style="font-size:9px;color:rgba(132,204,22,0.8);font-weight:700;letter-spacing:0.35em;text-transform:uppercase;margin-top:6px">MATHS LEVEL UP</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <a href="/student" style="background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:6px 10px;color:#fff;text-decoration:none;font-size:16px;line-height:1;">✕</a>
        <button onclick="captureRanking()" style="background:#eab308;border:none;border-radius:10px;padding:7px 10px;color:#000;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;letter-spacing:0.15em;white-space:nowrap;">📸 COPIAR</button>
      </div>
    </div>
  </div>

  <!-- Lista -->
  <div id="ranking-list" class="page-list"></div>
</div>

<!-- LOADING -->
<div id="loading-screen" style="position:fixed;inset:0;z-index:9999;background:rgba(5,42,36,0.95);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando...</div>
</div>

<!-- TOAST -->
<div id="toast"><span id="toast-icon">⚠️</span><span id="toast-msg">–</span></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/js/shared.js"></script>
<script>
function renderRanking() {
  const list     = document.getElementById('ranking-list');
  const students = getStudents();
  const counts   = getPickCounts();
  const medals   = ['🥇','🥈','🥉'];
  const podiumBg = [
    'linear-gradient(135deg,rgba(255,215,0,0.18),rgba(255,215,0,0.05))',
    'linear-gradient(135deg,rgba(192,192,192,0.15),rgba(192,192,192,0.04))',
    'linear-gradient(135deg,rgba(205,127,50,0.15),rgba(205,127,50,0.04))'
  ];
  const podiumBorder = ['rgba(255,215,0,0.4)','rgba(192,192,192,0.3)','rgba(205,127,50,0.3)'];

  const sub = document.getElementById('page-subtitle');
  if (sub) sub.textContent = 'MATHS LEVEL UP · ' + getSorteoMonth().toUpperCase();

  list.innerHTML = students.map((s, idx) => {
    const count   = counts[s.id] || 0;
    const pct     = Math.min(100, (count / (s.max || 1)) * 100);
    const full    = count >= s.max;
    const isPod   = idx < 3;
    const bg      = isPod ? podiumBg[idx] : 'rgba(255,255,255,0.03)';
    const border  = isPod ? podiumBorder[idx] : 'rgba(255,255,255,0.07)';
    const rankEl  = isPod
      ? `<span style="font-size:22px;line-height:1;flex-shrink:0">${medals[idx]}</span>`
      : `<span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;color:rgba(255,255,255,0.3);width:22px;text-align:center;flex-shrink:0">${idx+1}</span>`;
    return `
      <div style="background:${bg};border:1px solid ${border};border-radius:16px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;align-items:center;gap:10px">
          ${rankEl}
          <div style="width:36px;height:36px;border-radius:10px;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 12px ${s.color}55">${s.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
            <div style="height:6px;background:rgba(0,0,0,0.4);border-radius:10px;overflow:hidden;margin-top:5px">
              <div style="height:100%;width:0%;background:${s.color};border-radius:10px;transition:width 0.8s cubic-bezier(.34,1.1,.64,1)" data-width="${pct}"></div>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:${full?'#fb923c':'#e5e7eb'};line-height:1">${count}/${s.max}</div>
            <div style="font-size:9px;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.1em">${Math.round(pct)}%</div>
          </div>
        </div>
      </div>`;
  }).join('');

  setTimeout(() => {
    list.querySelectorAll('[data-width]').forEach(bar => { bar.style.width = bar.dataset.width + '%'; });
  }, 50);
}

function captureRanking() {
  const card = document.getElementById('ranking-card');
  showToast('Generando imagen...', 'success');
  html2canvas(card, { scale:2, useCORS:true, backgroundColor:null, logging:false }).then(canvas => {
    canvas.toBlob(blob => {
      if (navigator.clipboard && window.ClipboardItem) {
        navigator.clipboard.write([new ClipboardItem({'image/png': blob})])
          .then(() => showToast('¡Imagen copiada!', 'success'))
          .catch(() => descargarImagen(canvas));
      } else { descargarImagen(canvas); }
    }, 'image/png');
  });
}

REF.onSnapshot(doc => {
  const data = doc.exists ? doc.data() : {};
  allocations = data.allocations || {};
  overrides   = data.overrides   || {};
  appConfig   = data.config      || { startTime:'', endTime:'', totalNumbers: 200 };
  if (!appConfig.totalNumbers) appConfig.totalNumbers = 200;
  document.getElementById('loading-screen').style.display = 'none';
  renderRanking();
}, err => {
  console.error('[Firebase]', err);
  document.getElementById('loading-screen').style.display = 'none';
  showToast('No se pudo conectar.');
});
</script>
</body>
</html>
