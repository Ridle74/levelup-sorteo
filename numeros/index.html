<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LEVEL UP — Números del Sorteo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  body {
    background: radial-gradient(ellipse at top, #1a3a6b 0%, #0a1f3d 40%, #050d1a 100%);
    min-height: 100dvh; display: flex; align-items: flex-start; justify-content: center;
    padding: 12px;
  }
  .page-wrap {
    width: 100%; max-width: 480px; display: flex; flex-direction: column;
    border-radius: 24px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    border: 1px solid rgba(59,130,246,0.25); margin-top: 12px;
  }
  .page-header {
    background: linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#3b82f6 100%);
    padding: 18px 18px 14px; position: relative; overflow: hidden;
  }
  .page-header::before {
    content:''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.03) 20px,rgba(255,255,255,0.03) 40px);
  }
  .page-list {
    background: linear-gradient(180deg,#0a1f3d 0%,#050d1a 100%);
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
    padding-bottom: 20px;
  }
  .bg-deco { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .bg-deco div { position: absolute; border-radius: 50%; }
</style>
</head>
<body>

<div class="bg-deco">
  <div style="width:280px;height:280px;background:radial-gradient(circle,rgba(59,130,246,0.2),transparent 70%);top:-60px;right:-60px"></div>
  <div style="width:220px;height:220px;background:radial-gradient(circle,rgba(139,92,246,0.15),transparent 70%);bottom:-40px;left:-40px"></div>
  <div style="width:7px;height:7px;background:#eab308;opacity:0.7;top:10%;left:10%"></div>
  <div style="width:5px;height:5px;background:#84cc16;opacity:0.6;top:20%;right:15%"></div>
  <div style="width:6px;height:6px;background:#ec4899;opacity:0.6;bottom:25%;left:8%"></div>
  <div style="width:8px;height:8px;background:#f97316;opacity:0.5;bottom:15%;right:10%"></div>
</div>

<div class="page-wrap" id="numbers-card" style="position:relative;z-index:1">
  <!-- Header -->
  <div class="page-header">
    <div style="position:relative;display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;letter-spacing:-0.03em;line-height:1">
          <span style="color:#eab308">🎯</span> <span style="color:#93c5fd">NÚMEROS</span>
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:#fff;letter-spacing:-0.03em;line-height:1">DEL SORTEO</div>
        <div id="page-subtitle" style="font-size:9px;color:rgba(147,197,253,0.8);font-weight:700;letter-spacing:0.35em;text-transform:uppercase;margin-top:6px">MATHS LEVEL UP</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <a href="/" style="background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:6px 10px;color:#fff;text-decoration:none;font-size:16px;line-height:1;">✕</a>
        <button onclick="captureNumbers()" style="background:#eab308;border:none;border-radius:10px;padding:7px 10px;color:#000;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;letter-spacing:0.15em;white-space:nowrap;">📸 COPIAR</button>
      </div>
    </div>
  </div>

  <!-- Lista -->
  <div id="numbers-list" class="page-list"></div>
</div>

<!-- LOADING -->
<div id="loading-screen" style="position:fixed;inset:0;z-index:9999;background:rgba(5,13,26,0.95);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando...</div>
</div>

<!-- TOAST -->
<div id="toast"><span id="toast-icon">⚠️</span><span id="toast-msg">–</span></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/js/shared.js"></script>
<script>
function renderNumbers() {
  const list     = document.getElementById('numbers-list');
  const students = getStudents();

  const sub = document.getElementById('page-subtitle');
  if (sub) sub.textContent = 'MATHS LEVEL UP · ' + getSorteoMonth().toUpperCase();

  list.innerHTML = students.map(s => {
    const nums = Object.entries(allocations)
      .filter(([, id]) => String(id) === String(s.id))
      .map(([n]) => parseInt(n))
      .sort((a, b) => a - b);
    const count = nums.length;
    const pct   = Math.min(100, (count / (s.max || 1)) * 100);
    const full  = count >= s.max;
    const numsHtml = nums.length > 0
      ? nums.map(n => `<span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:${s.color};color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;box-shadow:0 2px 6px ${s.color}66">${n}</span>`).join('')
      : `<span style="font-size:11px;color:rgba(255,255,255,0.3);font-style:italic">Sin números aún</span>`;
    return `
      <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px;border-left:4px solid ${s.color}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:36px;height:36px;border-radius:10px;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 10px ${s.color}55">${s.icon}</div>
          <div style="flex:1">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;text-transform:uppercase">${s.name}</div>
            <div style="height:4px;background:rgba(0,0,0,0.4);border-radius:10px;margin-top:4px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${s.color};border-radius:10px"></div>
            </div>
          </div>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:${full?'#fb923c':'#e5e7eb'};flex-shrink:0">${count}/${s.max}</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${numsHtml}</div>
      </div>`;
  }).join('');
}

function captureNumbers() {
  const card = document.getElementById('numbers-card');
  showToast('Generando imagen...', 'success');
  html2canvas(card, { scale:2, useCORS:true, backgroundColor:null, logging:false }).then(canvas => {
    canvas.toBlob(blob => {
      if (navigator.clipboard && window.ClipboardItem) {
        navigator.clipboard.write([new ClipboardItem({'image/png': blob})])
          .then(() => showToast('¡Imagen copiada!', 'success'))
          .catch(() => descargarImagen(canvas, 'numeros-sorteo.png'));
      } else { descargarImagen(canvas, 'numeros-sorteo.png'); }
    }, 'image/png');
  });
}

REF.onSnapshot(doc => {
  const data = doc.exists ? doc.data() : {};
  allocations = data.allocations || {};
  overrides   = data.overrides   || {};
  appConfig   = data.config      || { startTime:'', endTime:'', totalNumbers: 200 };
  if (!appConfig.totalNumbers) appConfig.totalNumbers = 200;
  document.getElementById('loading-screen').style.display = 'none';
  renderNumbers();
}, err => {
  console.error('[Firebase]', err);
  document.getElementById('loading-screen').style.display = 'none';
  showToast('No se pudo conectar.');
});
</script>
</body>
</html>
