<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MATHS LEVEL UP — Cotiza a Domicilio</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; min-height:100dvh; background:#050d1a; color:#fff; font-family:'Barlow',sans-serif; }
.wrap { max-width:520px; margin:0 auto; padding:22px 18px 60px; }
.back { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,0.5); text-decoration:none; font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:18px; }
body { padding-top: calc(50px + env(safe-area-inset-top)); }
#hist-bar { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; gap:8px; padding: calc(8px + env(safe-area-inset-top)) 18px 8px; background:rgba(5,13,26,0.92); backdrop-filter:blur(16px) saturate(180%); border-bottom:1px solid rgba(255,255,255,0.08); }
.hist-btn { border:none; background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.85); width:38px; height:34px; border-radius:10px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s,color 0.15s; -webkit-tap-highlight-color:transparent; }
.hist-btn:active { background:rgba(99,102,241,0.18); color:#a5b4fc; }
#hist-home { background:rgba(99,102,241,0.14); color:#a5b4fc; }
.hero { background:linear-gradient(135deg,#7c2d12,#c2410c 50%,#f97316); border-radius:20px; padding:22px; margin-bottom:18px; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.025) 20px,rgba(255,255,255,0.025) 40px); }
.hero-ico { font-size:30px; }
.hero-t { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; line-height:1.05; margin-top:6px; }
.hero-s { font-size:12px; color:rgba(255,255,255,0.8); margin-top:6px; }
.blk { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:16px; margin-bottom:12px; }
.lbl { font-size:9px; font-weight:900; color:#6b7280; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:10px; }
.pills { display:flex; flex-wrap:wrap; gap:6px; }
.pill { border:2px solid rgba(255,255,255,0.12); border-radius:12px; padding:9px 15px; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:900; text-transform:uppercase; color:rgba(255,255,255,0.5); transition:all 0.15s; }
.pill.psel { border-color:#f97316; color:#fdba74; background:rgba(249,115,22,0.14); }
.fsm { width:100%; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:11px 12px; color:#fff; font-family:'Barlow',sans-serif; font-size:14px; outline:none; margin-bottom:10px; }
.fsm:focus { border-color:rgba(249,115,22,0.5); }
.two { display:flex; gap:10px; }
.two > div { flex:1; }
.res { background:linear-gradient(135deg,rgba(249,115,22,0.16),rgba(234,88,12,0.1)); border:1px solid rgba(249,115,22,0.3); border-radius:20px; padding:24px; text-align:center; margin-top:6px; }
.price-big { font-family:'Barlow Condensed',sans-serif; font-size:48px; font-weight:900; color:#fdba74; line-height:1; }
.price-lbl { font-size:10px; color:rgba(253,186,116,0.7); font-weight:700; letter-spacing:0.2em; text-transform:uppercase; margin-top:4px; }
.price-det { font-size:12px; color:rgba(255,255,255,0.5); margin-top:12px; line-height:1.8; text-align:left; }
.cta { margin-top:16px; width:100%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:12px 20px; color:#fff; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:13px; letter-spacing:0.15em; text-transform:uppercase; }
.empty { text-align:center; padding:24px; color:rgba(255,255,255,0.3); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:900; letter-spacing:0.05em; }
.note { font-size:11px; color:rgba(255,255,255,0.4); margin-top:4px; line-height:1.6; }
</style>
</head>
<body>
<div id="hist-bar">
  <button class="hist-btn" onclick="history.back()" title="Atrás">◀</button>
  <button class="hist-btn" id="hist-home" onclick="location.href='/'" title="Inicio">🏠</button>
  <button class="hist-btn" onclick="history.forward()" title="Adelante">▶</button>
</div>
<div class="wrap">
  <a class="back" href="/">‹ Volver al inicio</a>
  <div class="hero">
    <div class="hero-ico">🏠</div>
    <div class="hero-t">COTIZA TU CLASE A DOMICILIO</div>
    <div class="hero-s">Costo por hora de la clase + movilidad del profesor, según el día.</div>
  </div>

  <div class="blk">
    <div class="lbl">Tipo de clase</div>
    <div class="pills" id="cd-type">
      <div class="pill" data-v="individual">👤 Individual</div>
      <div class="pill" data-v="duo">👥 Dúo (2-3)</div>
      <div class="pill" data-v="group">👨‍👩‍👧 Grupo (4+)</div>
    </div>
  </div>

  <div class="blk">
    <div class="lbl">Tipo de día</div>
    <div class="pills" id="cd-day">
      <div class="pill" data-v="regular">📅 Regular (Lun–Vie)</div>
      <div class="pill" data-v="weekend">🌗 Fin de semana (+S/5)</div>
      <div class="pill" data-v="holiday">✨ Feriado</div>
    </div>
    <div class="note" id="cd-day-note"></div>
  </div>

  <div class="blk">
    <div class="lbl">Horas</div>
    <div class="two">
      <div>
        <div class="lbl" style="margin-bottom:6px;font-size:8px">Clase (h)</div>
        <input class="fsm" id="cd-hours" type="number" min="0.5" step="0.5" value="1.5" inputmode="decimal" style="margin-bottom:0">
      </div>
      <div>
        <div class="lbl" style="margin-bottom:6px;font-size:8px">Movilidad / traslado (h)</div>
        <input class="fsm" id="cd-transit" type="number" min="0" step="0.5" value="0.5" inputmode="decimal" style="margin-bottom:0">
      </div>
    </div>
  </div>

  <div id="cd-result"></div>
</div>

<script>
// Tarifas base (S/.) — clase a domicilio por hora según tipo, y movilidad/h.
const CD_RATE     = { individual:45, duo:32, group:24 };
const CD_TRANSIT  = 15;          // S/. por hora de movilidad/traslado
const CD_DAY_EXTRA = { regular:0, weekend:5, holiday:10 }; // recargo S/. por hora de clase
const CD_DAY_NOTE = {
  regular: 'Tarifa normal de lunes a viernes.',
  weekend: 'Sábados y domingos: +S/. 5 por hora de clase.',
  holiday: 'Feriados: tarifa especial, +S/. 10 por hora de clase.'
};
const CD = { type:null, day:null };

function bindPills(containerId, key) {
  const c = document.getElementById(containerId);
  c.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      CD[key] = p.dataset.v;
      c.querySelectorAll('.pill').forEach(x => x.classList.toggle('psel', x===p));
      if (key === 'day') document.getElementById('cd-day-note').textContent = CD_DAY_NOTE[CD.day] || '';
      calc();
    });
  });
}
bindPills('cd-type','type');
bindPills('cd-day','day');
document.getElementById('cd-hours').addEventListener('input', calc);
document.getElementById('cd-transit').addEventListener('input', calc);

function calc() {
  const res = document.getElementById('cd-result');
  const hours   = parseFloat(document.getElementById('cd-hours').value) || 0;
  const transit = parseFloat(document.getElementById('cd-transit').value) || 0;
  if (!CD.type || !CD.day || hours <= 0) {
    res.innerHTML = `<div class="empty">SELECCIONA TIPO DE CLASE, TIPO DE DÍA Y LAS HORAS</div>`;
    return;
  }
  const baseRate   = CD_RATE[CD.type];
  const dayExtra   = CD_DAY_EXTRA[CD.day];
  const classRate  = baseRate + dayExtra;
  const classCost  = Math.round(classRate * hours);
  const transitCost= Math.round(CD_TRANSIT * transit);
  const total      = classCost + transitCost;
  const typeLabels = { individual:'Individual', duo:'Dúo (2-3 alumnos)', group:'Grupo (4+ alumnos)' };
  const dayLabels  = { regular:'Regular (Lun–Vie)', weekend:'Fin de semana', holiday:'Feriado' };
  res.innerHTML = `
  <div class="res">
    <div class="price-lbl">COSTO TOTAL DE LA SESIÓN</div>
    <div class="price-big">S/. ${total}</div>
    <div class="price-det">
      Clase: ${hours} h × S/. ${classRate}/h ${dayExtra>0?`(S/. ${baseRate} + S/. ${dayExtra} recargo)`:''} = <strong>S/. ${classCost}</strong><br>
      Movilidad: ${transit} h × S/. ${CD_TRANSIT}/h = <strong>S/. ${transitCost}</strong><br>
      Tipo de clase: ${typeLabels[CD.type]} · Día: ${dayLabels[CD.day]}
    </div>
    <button class="cta" onclick="copyCD(${classCost},${transitCost},${total},${classRate})">📋 Copiar cotización</button>
  </div>`;
}
function copyCD(classCost, transitCost, total, classRate) {
  const typeLabels = { individual:'Individual', duo:'Dúo (2-3 alumnos)', group:'Grupo (4+ alumnos)' };
  const dayLabels  = { regular:'Regular (Lun–Vie)', weekend:'Fin de semana (sáb/dom)', holiday:'Feriado' };
  const hours   = parseFloat(document.getElementById('cd-hours').value) || 0;
  const transit = parseFloat(document.getElementById('cd-transit').value) || 0;
  const text = `COTIZACIÓN — CLASE A DOMICILIO — MATHS LEVEL UP\n\nTipo de clase: ${typeLabels[CD.type]}\nTipo de día: ${dayLabels[CD.day]}\nDuración de la clase: ${hours} h (S/. ${classRate}/h) = S/. ${classCost}\nMovilidad: ${transit} h = S/. ${transitCost}\n\nTOTAL POR SESIÓN: S/. ${total}\n\n¡Contáctanos para coordinar tu horario!`;
  navigator.clipboard.writeText(text).then(()=>alert('Cotización copiada al portapapeles.')).catch(()=>{});
}
</script>
</body>
</html>
