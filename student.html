function vPerfilRefresh() {
  const app = document.getElementById('app');
  if (app) app.innerHTML = '<div class="vw">' + vPerfil() + '</div>';
}

function perfilPickIcon(ico) {
  _perfilPendingIcon=ico;
  document.querySelectorAll('.perfil-ico-btn').forEach(b=>b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  _refreshPerfilAvatar();
}
function perfilPickColor(col) {
  _perfilPendingColor=col;
  document.querySelectorAll('.perfil-color-dot').forEach(b=>b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  _refreshPerfilAvatar();
}
function perfilPickFrame(fid) {
  _perfilPendingFrame=fid;
  document.querySelectorAll('.perfil-frame-opt').forEach(el=>el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  _refreshPerfilAvatar();
}
function _refreshPerfilAvatar() {
  const id=getLoggedId(); const st=getStudents().find(s=>s.id===id)||{};
  const ov=overrides[String(id)]||{};
  const wrap=document.getElementById('perfil-avatar-wrap'); if(!wrap)return;
  wrap.innerHTML=makeAvatarHTML(
    _perfilPendingIcon||st.icon||'😀',
    _perfilPendingColor||st.color||'#8B5CF6',
    _perfilPendingPhoto!==null?_perfilPendingPhoto:(ov.photo||null),
    _perfilPendingFrame!==null?_perfilPendingFrame:(ov.frame||'none'), 80);
}
function perfilPhotoSelected() {
  const input=document.getElementById('perfil-file-input');
  if(!input||!input.files[0])return;
  const reader=new FileReader();
  reader.onload=function(e){
    _cropImg=new Image();
    _cropImg.onload=function(){
      _cropX=0;_cropY=0;
      _cropScale=220/Math.min(_cropImg.width,_cropImg.height);
      const w=document.getElementById('perfil-crop-wrap');
      if(w)w.style.display='flex';
      perfilDrawCrop();
    };
    _cropImg.src=e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
  perfilSetupCropCanvas();
}
function perfilDrawCrop() {
  const canvas=document.getElementById('perfil-crop-canvas');
  if(!canvas||!_cropImg)return;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,220,220);
  ctx.drawImage(_cropImg,_cropX,_cropY,_cropImg.width*_cropScale,_cropImg.height*_cropScale);
}
function perfilCropZoom() {
  const z=parseFloat(document.getElementById('perfil-crop-zoom').value);
  const old=_cropScale;
  _cropScale=(220/Math.min(_cropImg.width,_cropImg.height))*z;
  const r=_cropScale/old;
  _cropX=110-(110-_cropX)*r; _cropY=110-(110-_cropY)*r;
  perfilDrawCrop();
}
function perfilSetupCropCanvas() {
  setTimeout(function(){
    const el=document.getElementById('perfil-crop-container'); if(!el)return;
    el.addEventListener('mousedown',  function(e){_cropDragging=true;_cropLX=e.clientX;_cropLY=e.clientY;el.style.cursor='grabbing';});
    el.addEventListener('mousemove',  function(e){if(!_cropDragging)return;_cropX+=e.clientX-_cropLX;_cropY+=e.clientY-_cropLY;_cropLX=e.clientX;_cropLY=e.clientY;perfilDrawCrop();});
    el.addEventListener('mouseup',    function(){_cropDragging=false;el.style.cursor='grab';});
    el.addEventListener('mouseleave', function(){_cropDragging=false;el.style.cursor='grab';});
    el.addEventListener('touchstart', function(e){_cropDragging=true;_cropLX=e.touches[0].clientX;_cropLY=e.touches[0].clientY;e.preventDefault();},{passive:false});
    el.addEventListener('touchmove',  function(e){if(!_cropDragging)return;_cropX+=e.touches[0].clientX-_cropLX;_cropY+=e.touches[0].clientY-_cropLY;_cropLX=e.touches[0].clientX;_cropLY=e.touches[0].clientY;perfilDrawCrop();e.preventDefault();},{passive:false});
    el.addEventListener('touchend',   function(){_cropDragging=false;});
  },200);
}
function perfilCropConfirm() {
  const src=document.getElementById('perfil-crop-canvas'); if(!src)return;
  const out=document.createElement('canvas'); out.width=240;out.height=240;
  const ctx=out.getContext('2d');
  ctx.beginPath();ctx.arc(120,120,120,0,Math.PI*2);ctx.clip();
  ctx.drawImage(src,0,0,220,220,0,0,240,240);
  _perfilPendingPhoto=out.toDataURL('image/jpeg',0.75);
  document.getElementById('perfil-crop-wrap').style.display='none';
  _refreshPerfilAvatar();
  showToast('Foto lista — guardá los cambios');
}
function perfilRemovePhoto() {
  _perfilPendingPhoto='';
  _refreshPerfilAvatar();
  const w=document.getElementById('perfil-crop-wrap'); if(w)w.style.display='none';
}


async function perfilSaveProfile() {
  const id = getLoggedId();
  if (!_perfilPendingIcon && !_perfilPendingColor && !_perfilPendingFrame) {
    showToast('No hay cambios que guardar'); return;
  }
  const snap = await REF.get();
  const data = snap.exists ? snap.data() : {};
  const ov = data.overrides || {};
  const key = String(id);
  ov[key] = ov[key] || {};
  if (_perfilPendingIcon)           ov[key].icon  = _perfilPendingIcon;
  if (_perfilPendingColor)          ov[key].color = _perfilPendingColor;
  if (_perfilPendingFrame!==null)   ov[key].frame = _perfilPendingFrame;
  if (_perfilPendingPhoto!==null)   ov[key].photo = _perfilPendingPhoto;
  await REF.set({ overrides: ov }, { merge: true });
  overrides = ov;
  _perfilPendingIcon=null;_perfilPendingColor=null;_perfilPendingFrame=null;_perfilPendingPhoto=null;
  showToast('Perfil guardado ✓');
  vPerfilRefresh();
}

async function perfilSavePin() {
  const id = getLoggedId();
  const students = getStudents();
  const st = students.find(s=>s.id===id)||{};
  const oldPin  = document.getElementById('perfil-pin-old').value.trim();
  const newPin  = document.getElementById('perfil-pin-new').value.trim();
  const newPin2 = document.getElementById('perfil-pin-new2').value.trim();
  if (!oldPin||!newPin||!newPin2) { showToast('Completa todos los campos'); return; }
  if (String(oldPin) !== String(st.pin||'')) { showToast('PIN actual incorrecto'); return; }
  if (newPin !== newPin2) { showToast('Los PINs no coinciden'); return; }
  if (newPin.length < 4) { showToast('El PIN debe tener al menos 4 caracteres'); return; }
  const key = String(id);
  const snap = await REF.get();
  const data = snap.exists ? snap.data() : {};
  const ov = data.overrides || {};
  ov[key] = ov[key] || {};
  ov[key].pin = newPin;
  await REF.set({ overrides: ov }, { merge: true });
  overrides = ov;
  showToast('PIN cambiado');
  document.getElementById('perfil-pin-old').value='';
  document.getElementById('perfil-pin-new').value='';
  document.getElementById('perfil-pin-new2').value='';
}

let _ptsTimer=null;
// idx = posición del cuadradito dentro del campo (0..count-1); count = tamaño esperado del arreglo (para rellenar huecos).
function togglePointMark(studentId, dateKey, field, idx, count, checked) {
  _lastPtsLocalEdit = Date.now();
  const key=String(studentId);
  if (!pointsLog[key]) pointsLog[key]={};
  if (!pointsLog[key][dateKey]) pointsLog[key][dateKey]={hours:[],progress:[],tasks:[]};
  const entry = pointsLog[key][dateKey];
  if (!Array.isArray(entry[field])) entry[field]=[];
  while (entry[field].length < count) entry[field].push(false);
  entry[field][idx]=!!checked;
  // Refresca el total mostrado en la cabecera de la fila sin re-render completo
  const totalEl=document.getElementById(`pts-total-${studentId}`);
  if (totalEl) totalEl.textContent=getTotalPts(studentId);
  clearTimeout(_ptsTimer);
  _ptsTimer=setTimeout(()=>{ saveLms(); showToast('Puntos guardados.','success'); },800);
}

// Marca/desmarca una fecha como "faltó a clase": al marcarla se borran las casillas de
// Horas/Progreso/Tareas de ese día y se excluye del cálculo de puntos (no suma ni resta).
function toggleAbsent(studentId, dateKey, checked) {
  _lastPtsLocalEdit = Date.now();
  const key=String(studentId);
  if (!pointsLog[key]) pointsLog[key]={};
  if (!pointsLog[key][dateKey]) pointsLog[key][dateKey]={hours:[],progress:[],tasks:[]};
  const entry = pointsLog[key][dateKey];
  entry.absent = !!checked;
  if (checked) { entry.hours=[]; entry.progress=[]; entry.tasks=[]; }
  const totalEl=document.getElementById(`pts-total-${studentId}`);
  if (totalEl) totalEl.textContent=getTotalPts(studentId);
  const cont=document.getElementById(`pts-dates-${studentId}`);
  const st=getStudents().find(x=>String(x.id)===key);
  if (cont && st) cont.outerHTML = vPtsDateChecklist(st);
  clearTimeout(_ptsTimer);
  _ptsTimer=setTimeout(()=>{ saveLms(); showToast(checked?'Marcado como ausente: esta fecha no sumará puntos.':'Asistencia restaurada.','success'); },400);
}

// ════════════════════════════════════════════════════════
// FIREBASE LISTENER + BOOT
// ════════════════════════════════════════════════════════
// Mantiene la clave del admin sincronizada con /padres (mismo documento compartido).
AUTH_REF.onSnapshot(doc => {
  const a = doc.exists ? doc.data() : {};
  ADMIN.pin = a.adminPin || "80808";
}, err => console.error('[Firebase auth]', err));

// Normaliza nombres para emparejar alumnos entre /student y /padres (minúsculas, sin tildes, sin espacios extra).
function normName(s) {
  return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
}
PADRES_REF.onSnapshot(doc => {
  const d = doc.exists ? doc.data() : {};
  const pStudents = d.students || {};
  const pSessions = Array.isArray(d.sessions) ? d.sessions : [];
  padresRaw = { students: pStudents, sessions: pSessions };
  const map = {}, slotMap = {};
  Object.entries(pStudents).forEach(([sid, st]) => {
    // días de clase con su total de horas ese día (suma de duraciones / 60), p.ej. {1: 2, 4: 1}
    const hoursByDay = {}, slotsByDay = {};
    pSessions.filter(s => String(s.studentId)===String(sid)).forEach(s => {
      const h = Math.max(1, Math.round((s.dur||60)/60));
      hoursByDay[s.day] = (hoursByDay[s.day]||0) + h;
      if (!slotsByDay[s.day]) slotsByDay[s.day] = [];
      slotsByDay[s.day].push({ start: s.start || '', dur: s.dur || 60, modality: s.modality || '' });
    });
    // ordenar los slots de cada día cronológicamente por hora de inicio
    Object.keys(slotsByDay).forEach(d => slotsByDay[d].sort((a,b)=>(a.start||'').localeCompare(b.start||'')));
    const key = normName(st.name);
    map[key] = hoursByDay;
    slotMap[key] = slotsByDay;
  });
  classDaysByName  = map;
  classSlotsByName = slotMap;
  if (currentView === 'puntos') {
    const app=document.getElementById('app');
    if (app) app.innerHTML=`<div class="vw">${vPuntos()}</div>`;
  }
  if (currentView === 'horarios') {
    const app=document.getElementById('app');
    if (app) app.innerHTML=`<div class="vw">${vHorarios()}</div>`;
    renderHorariosSidebar();
  }
}, err => console.error('[Firebase padres]', err));

REF.onSnapshot(doc => {
  const data = doc.exists ? doc.data() : {};
  allocations = data.allocations || {};
  overrides   = data.overrides   || {};
  appConfig   = data.config      || { startTime:'', endTime:'', totalNumbers: 200 };
  if (!appConfig.totalNumbers) appConfig.totalNumbers = 200;
  const lms   = data.lms || {};
  tasks       = Array.isArray(lms.tasks)  ? lms.tasks  : [];
  points      = typeof lms.points==='object' ? lms.points : {};
  pointsLog   = typeof lms.pointsLog==='object' && lms.pointsLog ? lms.pointsLog : {};
  pointsHistory = typeof lms.pointsHistory==='object' && lms.pointsHistory ? lms.pointsHistory : {};
  taskMultipliers = typeof lms.taskMultipliers==='object' && lms.taskMultipliers ? lms.taskMultipliers : {};
  archiveMonthIfNeeded();
  // Migración inicial única: si "Joanna Prado" todavía no tiene multiplicador configurado, se le asigna ×3
  // (caso conocido actual: lleva temas de un nivel más avanzado). El admin puede cambiarlo luego desde el panel.
  (function seedJoannaMult(){
    const joanna = getStudents().find(s => normName(s.name)===normName('Joanna Prado'));
    if (joanna && taskMultipliers[String(joanna.id)]===undefined) {
      taskMultipliers[String(joanna.id)] = 3;
      saveLms();
    }
  })();

  if (!appReady) {
    appReady = true;
    document.getElementById('initial-loading').classList.add('hidden');
    router();
  } else {
    // Live-update tablero if it's open
    const hash = currentView;
    if (hash === 'tablero') {
      const loggedId = getLoggedId();
      if (loggedId !== null) renderAll(loggedId);
    }
    if (hash === 'ranking')   vRankingSetup();
    if (hash === 'numeros')   vNumerosSetup();
    if (hash === 'dashboard') {
      const app=document.getElementById('app');
      if (app) app.innerHTML=`<div class="vw">${vDashboard()}</div>`;
    }
    if (hash === 'puntos') {
      // Evita re-render completo (parpadeo/salto) justo después de marcar una casilla:
      // la actualización optimista ya refleja el cambio en pantalla; el snapshot que
      // confirma nuestro propio guardado llega ~1s después y no necesita re-pintar todo.
      if (Date.now() - _lastPtsLocalEdit > 2500) {
        const app=document.getElementById('app');
        if (app) app.innerHTML=`<div class="vw">${vPuntos()}</div>`;
      }
    }
    if (hash === 'horarios') renderHorariosSidebar();
  }
}, err => {
  console.error('[Firebase]', err);
  document.getElementById('initial-loading').classList.add('hidden');
  appReady = true;
  router();
  showToast('No se pudo conectar a Firebase.');
});

// Image viewer modal
function openImgViewer(url, name){
  let modal = document.getElementById('img-viewer-modal');
  if (!modal){
    modal = document.createElement('div');
    modal.id = 'img-viewer-modal';
    modal.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.93);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:16px;box-sizing:border-box';
    modal.innerHTML = `<img id="img-viewer-img" style="max-width:100%;max-height:75dvh;border-radius:10px;object-fit:contain;box-shadow:0 4px 32px rgba(0,0,0,0.6)">
      <div style="display:flex;gap:10px;margin-top:16px">
        <a id="img-viewer-dl" download="" style="background:rgba(79,182,255,0.2);border:1px solid rgba(79,182,255,0.4);color:#4fb6ff;border-radius:12px;padding:10px 22px;font-weight:900;font-size:13px;text-decoration:none;letter-spacing:0.08em">⬇ DESCARGAR</a>
        <button onclick="closeImgViewer()" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);border-radius:12px;padding:10px 22px;font-weight:900;font-size:13px;cursor:pointer;letter-spacing:0.08em">✕ CERRAR</button>
      </div>`;
    modal.addEventListener('click', e=>{ if(e.target===modal) closeImgViewer(); });
    document.body.appendChild(modal);
  }
  document.getElementById('img-viewer-img').src = url;
  const dl = document.getElementById('img-viewer-dl');
  dl.href = url; dl.download = name||'imagen.jpg';
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeImgViewer(){
  const m = document.getElementById('img-viewer-modal');
  if (m) m.style.display = 'none';
  document.body.style.overflow = '';
}
