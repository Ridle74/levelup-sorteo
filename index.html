<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MATHS LEVEL UP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ── SPA SHELL ─────────────────────────────────────── */
#app { min-height: 100dvh; }
body.nav-visible { padding-bottom: calc(64px + env(safe-area-inset-bottom)); }

/* ── INITIAL LOADING ──────────────────────────────── */
#initial-loading {
  position: fixed; inset: 0; z-index: 9999;
  background: #050d1a; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
#initial-loading.hidden { display: none; }

/* ── VIEW TRANSITION ──────────────────────────────── */
.vw { animation: vIn 0.18s ease-out; }
@keyframes vIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

/* ── BOTTOM NAV ───────────────────────────────────── */
#bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(5,13,26,0.97); backdrop-filter: blur(16px) saturate(180%);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-bottom: env(safe-area-inset-bottom);
}
#bottom-nav.visible { display: block; }
.nav-row { display: flex; max-width: 600px; margin: 0 auto; }
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding: 10px 2px 8px; border: none; background: none; cursor: pointer;
  color: rgba(255,255,255,0.35); font-family: 'Barlow Condensed', sans-serif;
  font-size: 8px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase;
  transition: color 0.15s; -webkit-tap-highlight-color: transparent;
}
.nav-btn .ni { font-size: 22px; line-height: 1; display: block; }
.nav-btn.active { color: #60a5fa; }
.nav-btn.active .ni { filter: drop-shadow(0 0 5px rgba(96,165,250,0.5)); }

/* ── DASHBOARD ────────────────────────────────────── */
.dash-hero {
  background: linear-gradient(135deg,#1e3a8a,#2563eb 50%,#3b82f6);
  border-radius: 20px; padding: 20px; margin-bottom: 10px;
  position: relative; overflow: hidden;
}
.dash-hero::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.025) 20px,rgba(255,255,255,0.025) 40px); }
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.dash-stat { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:14px; }
.ds-lbl { font-size:8px; font-weight:900; color:#6b7280; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:4px; }
.ds-val { font-family:'Barlow Condensed',sans-serif; font-size:30px; font-weight:900; line-height:1; }
.dash-link {
  display:flex; align-items:center; gap:12px;
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  border-radius:14px; padding:14px 16px; margin-bottom:8px; cursor:pointer;
  color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:900;
  text-transform:uppercase; letter-spacing:0.05em; transition:background 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.dash-link:active { background:rgba(255,255,255,0.09); }
.dl-ico { font-size:24px; flex-shrink:0; }
.dl-arr { margin-left:auto; color:rgba(255,255,255,0.25); font-size:20px; }

/* ── TAREAS ───────────────────────────────────────── */
.task-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:14px; margin-bottom:8px; }
.task-card.tdone { opacity:0.45; }
.task-t { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:900; text-transform:uppercase; }
.task-t.tdt { text-decoration:line-through; }
.task-d { font-size:12px; color:rgba(255,255,255,0.55); margin-top:4px; line-height:1.5; }
.task-btns { display:flex; gap:6px; margin-top:10px; }
.btn-dg {
  flex:1; border:none; border-radius:10px; padding:9px; cursor:pointer;
  font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:12px;
  letter-spacing:0.1em; text-transform:uppercase;
}
.btn-dg.off { background:rgba(34,197,94,0.15); color:#4ade80; border:1px solid rgba(34,197,94,0.25); }
.btn-dg.on  { background:rgba(34,197,94,0.3);  color:#86efac; border:1px solid rgba(34,197,94,0.4); }
.btn-dt { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#f87171; border-radius:10px; padding:9px 12px; cursor:pointer; font-size:14px; }
.add-task-box { background:rgba(59,130,246,0.07); border:1px solid rgba(59,130,246,0.2); border-radius:16px; padding:16px; margin-top:12px; }
.fsm { width:100%; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:9px 12px; color:#fff; font-family:'Barlow',sans-serif; font-size:13px; box-sizing:border-box; margin-bottom:8px; outline:none; }
.fsm:focus { border-color:rgba(59,130,246,0.5); }
textarea.fsm { resize:none; height:64px; }

/* ── PUNTOS ───────────────────────────────────────── */
.pts-hero { background:linear-gradient(135deg,#1a3a1a,#14532d 50%,#166534); border-radius:20px; padding:20px; margin-bottom:10px; }
.pts-row { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:14px; margin-bottom:8px; }
.vr-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.vr-lbl { font-size:9px; font-weight:900; color:#6b7280; letter-spacing:0.15em; text-transform:uppercase; width:74px; flex-shrink:0; }
.vr-bg  { flex:1; height:7px; background:rgba(0,0,0,0.4); border-radius:10px; overflow:hidden; }
.vr-fill{ height:100%; border-radius:10px; transition:width 0.7s ease; }
.vr-num { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:900; width:30px; text-align:right; flex-shrink:0; }
.vr-inp { background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:3px 8px; color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:900; width:54px; text-align:center; }

/* ── COTIZADOR ────────────────────────────────────── */
.cotiz-blk { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:16px; margin-bottom:10px; }
.cotiz-l { font-size:8px; font-weight:900; color:#6b7280; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:10px; }
.pills { display:flex; flex-wrap:wrap; gap:6px; }
.pill { border:2px solid rgba(255,255,255,0.12); border-radius:12px; padding:8px 14px; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:900; text-transform:uppercase; color:rgba(255,255,255,0.5); transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.pill.psel { border-color:#3b82f6; color:#93c5fd; background:rgba(59,130,246,0.12); }
.cotiz-res { background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(139,92,246,0.1)); border:1px solid rgba(59,130,246,0.3); border-radius:20px; padding:24px; text-align:center; margin-top:12px; }
.price-big { font-family:'Barlow Condensed',sans-serif; font-size:52px; font-weight:900; color:#93c5fd; line-height:1; }
.price-lbl { font-size:10px; color:rgba(147,197,253,0.6); font-weight:700; letter-spacing:0.2em; text-transform:uppercase; margin-top:4px; }
.price-det { font-size:12px; color:rgba(255,255,255,0.5); margin-top:12px; line-height:1.8; }

/* ── RANKING / NUMEROS PAGE ────────────────────────── */
.pub-wrap { width:100%; max-width:480px; margin:12px auto; border-radius:24px; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,0.7); }
.pub-hdr  { padding:18px 18px 14px; position:relative; overflow:hidden; }
.pub-hdr::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.025) 20px,rgba(255,255,255,0.025) 40px); }
.pub-list { padding:10px 12px 20px; display:flex; flex-direction:column; gap:8px; }

/* ── MISC ─────────────────────────────────────────── */
.sec-lbl { font-size:9px; font-weight:900; color:#6b7280; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:8px; }
.btn-sm {
  border:none; border-radius:10px; padding:9px 16px; cursor:pointer;
  font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:12px;
  letter-spacing:0.1em; text-transform:uppercase;
}
.btn-primary { background:#3b82f6; color:#fff; }
.btn-primary:active { background:#2563eb; }
</style>
