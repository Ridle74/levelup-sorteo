<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LEVEL UP 芒聙聰 Sorteo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Conectando...</div>
</div>

<!-- LOGIN -->
<div id="login-screen" style="display:none">
  <div class="login-card fade-in">
    <div style="text-align:center;margin-bottom:32px">
      <div class="login-title">LEVEL UP</div>
      <div class="login-sub" id="login-sub">Sorteo</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div>
        <label class="field-label">Alumno</label>
        <select id="sel-student" class="field-input" style="cursor:pointer">
          <option value="" disabled selected>芒聙聰 Selecciona tu nombre 芒聙聰</option>
        </select>
      </div>
      <div>
        <label class="field-label">PIN de acceso</label>
        <input type="password" id="inp-pin" class="field-input" placeholder="芒聙垄芒聙垄芒聙垄芒聙垄" autocomplete="off">
      </div>
      <div id="login-err" style="color:#f87171;font-size:11px;font-weight:700;text-align:center;display:none">PIN incorrecto</div>
      <button class="btn-login" onclick="doLogin()">INGRESAR</button>
      <a href="/ranking" style="display:block;text-align:center;background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--muted);border-radius:14px;padding:11px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;">
        冒聼聫聠 VER TABLA DE POSICIONES
      </a>
      <a href="/numeros" style="display:block;text-align:center;background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--muted);border-radius:14px;padding:11px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;">
        冒聼聨炉 VER N脙職MEROS DEL SORTEO
      </a>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><span id="toast-icon">芒職聽茂赂聫</span><span id="toast-msg">芒聙聯</span></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/js/shared.js"></script>
<script>
  // Si ya hay sesi脙鲁n activa, ir directo al tablero
  if (getLoggedId() !== null) window.location.href = '/tablero';

  function buildLoginSelect() {
    const sub = document.getElementById('login-sub');
    if (sub) sub.textContent = 'Sorteo de ' + getSorteoMonth();
    const sel = document.getElementById('sel-student');
    sel.innerHTML = '<option value="" disabled selected>芒聙聰 Selecciona tu nombre 芒聙聰</option>';
    getFullList().forEach(s => {
      const opt = document.createElement('option');
      opt.value = String(s.id);
      opt.textContent = s.icon + ' ' + s.name;
      sel.appendChild(opt);
    });
  }

  function doLogin() {
    const selId   = document.getElementById('sel-student').value;
    const pin     = document.getElementById('inp-pin').value;
    const err     = document.getElementById('login-err');
    const student = getFullList().find(s => String(s.id) === selId);
    if (!student || String(student.pin) !== pin) {
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 2500);
      return;
    }
    setLoggedId(student.id);
    window.location.href = '/tablero';
  }

  document.getElementById('inp-pin').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  REF.onSnapshot(doc => {
    const data = doc.exists ? doc.data() : {};
    allocations = data.allocations || {};
    overrides   = data.overrides   || {};
    appConfig   = data.config      || { startTime:'', endTime:'', totalNumbers: 200 };
    if (!appConfig.totalNumbers) appConfig.totalNumbers = 200;
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('login-screen').style.display = 'flex';
    buildLoginSelect();
  }, err => {
    console.error('[Firebase]', err);
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('login-screen').style.display = 'flex';
    buildLoginSelect();
    showToast('No se pudo conectar a Firebase.');
  });
</script>
</body>
</html>
